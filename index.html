<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Times Quest">
<meta name="theme-color" content="#0a0a1a">
<title>Times Quest</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-cyan: #00f5ff;
    --neon-purple: #bf00ff;
    --neon-green: #39ff14;
    --neon-red: #ff0044;
    --neon-gold: #ffd700;
    --neon-orange: #ff6b00;
    --bg-deep: #03030f;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-border: rgba(0,245,255,0.15);
    --text-primary: #e0f0ff;
    --text-muted: rgba(224,240,255,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Exo 2', sans-serif;
    overflow: hidden;
    position: fixed;
  }

  /* Animated star background */
  #stars-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(191,0,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(0,245,255,0.08) 0%, transparent 50%),
      #03030f;
  }

  .star {
    position: absolute; width: 2px; height: 2px;
    background: white; border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.5); }
  }

  /* Grid lines */
  .grid-lines {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* SCREENS */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px 20px;
    transition: opacity 0.4s, transform 0.4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

  /* ═══════════════ HOME SCREEN ═══════════════ */
  #home { gap: 0; }

  .logo-wrap {
    text-align: center; margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .logo-icon {
    font-size: 64px; line-height: 1;
    filter: drop-shadow(0 0 20px var(--neon-gold));
  }

  .logo-title {
    font-family: 'Orbitron', monospace;
    font-size: 32px; font-weight: 900;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    text-shadow: none;
    filter: drop-shadow(0 0 10px rgba(0,245,255,0.5));
    margin-bottom: 4px;
  }

  .logo-sub {
    font-size: 12px; letter-spacing: 6px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 32px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 12px; margin-bottom: 28px; width: 100%; max-width: 340px;
  }
  .stat-chip {
    flex: 1; background: var(--bg-card);
    border: 1px solid var(--bg-card-border);
    border-radius: 12px; padding: 10px 8px;
    text-align: center;
  }
  .stat-chip .val {
    font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700;
    color: var(--neon-gold);
  }
  .stat-chip .lbl { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }

  /* Range selector */
  .range-card {
    width: 100%; max-width: 340px;
    background: var(--bg-card);
    border: 1px solid var(--bg-card-border);
    border-radius: 20px; padding: 20px;
    margin-bottom: 20px;
  }

  .range-title {
    font-family: 'Orbitron', monospace; font-size: 11px;
    letter-spacing: 3px; color: var(--neon-cyan);
    margin-bottom: 16px; text-align: center;
  }

  .range-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .range-row label { font-size: 12px; color: var(--text-muted); width: 32px; text-align: right; }

  input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px; outline: none;
    background: rgba(0,245,255,0.15);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--neon-cyan);
    box-shadow: 0 0 10px var(--neon-cyan);
    cursor: pointer;
  }

  .range-val {
    font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 700;
    color: var(--neon-cyan); width: 28px; text-align: center;
  }

  /* Difficulty buttons */
  .diff-row {
    display: flex; gap: 8px; margin-bottom: 24px; width: 100%; max-width: 340px;
  }
  .diff-btn {
    flex: 1; padding: 10px 4px; border-radius: 12px; border: none;
    font-family: 'Exo 2', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .diff-btn.active-easy {
    background: rgba(57,255,20,0.15); color: var(--neon-green);
    border-color: var(--neon-green);
    box-shadow: 0 0 12px rgba(57,255,20,0.3);
  }
  .diff-btn.active-medium {
    background: rgba(255,215,0,0.15); color: var(--neon-gold);
    border-color: var(--neon-gold);
    box-shadow: 0 0 12px rgba(255,215,0,0.3);
  }
  .diff-btn.active-hard {
    background: rgba(255,0,68,0.15); color: var(--neon-red);
    border-color: var(--neon-red);
    box-shadow: 0 0 12px rgba(255,0,68,0.3);
  }

  /* Start button */
  .start-btn {
    width: 100%; max-width: 340px; padding: 18px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    border: none; border-radius: 16px;
    font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 700;
    color: #fff; letter-spacing: 4px; cursor: pointer;
    box-shadow: 0 0 30px rgba(0,245,255,0.4), 0 0 60px rgba(191,0,255,0.2);
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .start-btn:active { transform: scale(0.97); }
  .start-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    transform: translateX(-100%);
    animation: shimmer 2.5s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ═══════════════ GAME SCREEN ═══════════════ */
  #game { justify-content: space-between; }

  /* HUD */
  .hud {
    width: 100%; max-width: 380px;
    display: flex; align-items: center; justify-content: space-between;
    padding-top: env(safe-area-inset-top);
  }

  .hud-lives { display: flex; gap: 4px; }
  .life { font-size: 22px; transition: all 0.3s; }
  .life.lost { opacity: 0.2; filter: grayscale(1); transform: scale(0.8); }

  .hud-score {
    font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700;
    color: var(--neon-gold);
    text-shadow: 0 0 10px rgba(255,215,0,0.6);
  }

  .hud-timer-wrap {
    position: relative; width: 48px; height: 48px;
  }
  .timer-svg { width: 48px; height: 48px; transform: rotate(-90deg); }
  .timer-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 3; }
  .timer-ring {
    fill: none; stroke: var(--neon-cyan); stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 126; stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }
  .timer-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700;
    color: var(--neon-cyan);
  }

  /* Streak */
  .streak-bar {
    width: 100%; max-width: 380px;
    display: flex; gap: 6px; align-items: center;
    margin: 4px 0;
  }
  .streak-label { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; }
  .streak-dots { display: flex; gap: 4px; }
  .streak-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    transition: all 0.3s;
  }
  .streak-dot.lit {
    background: var(--neon-gold);
    box-shadow: 0 0 8px var(--neon-gold);
    border-color: var(--neon-gold);
    animation: pulse-dot 0.5s ease;
  }
  @keyframes pulse-dot {
    0% { transform: scale(1); }
    50% { transform: scale(1.6); }
    100% { transform: scale(1); }
  }

  /* Question area */
  .question-arena {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100%; max-width: 380px;
    gap: 12px;
  }

  .level-badge {
    font-size: 11px; letter-spacing: 3px; color: var(--text-muted);
    text-transform: uppercase;
  }

  .question-card {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--bg-card-border);
    border-radius: 24px; padding: 28px 20px;
    text-align: center; position: relative; overflow: hidden;
    transition: all 0.3s;
  }
  .question-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,245,255,0.03), rgba(191,0,255,0.03));
    pointer-events: none;
  }

  .question-text {
    font-family: 'Orbitron', monospace; font-size: 48px; font-weight: 900;
    color: white;
    text-shadow: 0 0 20px rgba(0,245,255,0.3);
    letter-spacing: 2px;
    animation: question-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes question-in {
    from { opacity: 0; transform: scale(0.6) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .question-hint { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

  /* Answer input */
  .answer-section {
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 12px;
  }

  .answer-input-wrap {
    position: relative;
  }

  #answer-input {
    width: 100%; padding: 18px 60px 18px 20px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(0,245,255,0.3);
    border-radius: 16px;
    font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 700;
    color: white; text-align: center; outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    -webkit-appearance: none;
  }
  #answer-input:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.25);
  }
  #answer-input.correct-flash {
    border-color: var(--neon-green);
    box-shadow: 0 0 30px rgba(57,255,20,0.5);
    animation: correct-pulse 0.4s ease;
  }
  #answer-input.wrong-flash {
    border-color: var(--neon-red);
    box-shadow: 0 0 30px rgba(255,0,68,0.5);
    animation: shake 0.4s ease;
  }
  @keyframes correct-pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .submit-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(191,0,255,0.2));
    border: 2px solid rgba(0,245,255,0.4);
    border-radius: 14px;
    font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700;
    color: var(--neon-cyan); letter-spacing: 3px; cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 15px rgba(0,245,255,0.1);
  }
  .submit-btn:active { transform: scale(0.97); }

  /* Feedback overlay */
  #feedback-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0;
  }
  #feedback-overlay.show { animation: feedback-flash 0.7s ease forwards; }
  @keyframes feedback-flash {
    0% { opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }

  .feedback-text {
    font-family: 'Orbitron', monospace; font-size: 56px; font-weight: 900;
    letter-spacing: 4px;
    animation: feedback-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes feedback-pop {
    0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .feedback-text.correct { color: var(--neon-green); text-shadow: 0 0 30px var(--neon-green), 0 0 60px rgba(57,255,20,0.4); }
  .feedback-text.wrong { color: var(--neon-red); text-shadow: 0 0 30px var(--neon-red), 0 0 60px rgba(255,0,68,0.4); }

  .feedback-sub {
    font-size: 18px; margin-top: 8px; color: white; opacity: 0.9;
    animation: feedback-pop 0.7s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  /* Score popup */
  .score-popup {
    position: fixed; z-index: 200;
    font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 700;
    color: var(--neon-gold); pointer-events: none;
    animation: score-float 0.8s ease forwards;
    text-shadow: 0 0 10px var(--neon-gold);
  }
  @keyframes score-float {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
  }

  /* Particles */
  .particle {
    position: fixed; z-index: 99; width: 8px; height: 8px;
    border-radius: 50%; pointer-events: none;
    animation: particle-burst var(--dur, 0.8s) ease forwards;
  }
  @keyframes particle-burst {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx,0), var(--ty,-100px)) scale(0); opacity: 0; }
  }

  /* ═══════════════ RESULT SCREEN ═══════════════ */
  #result { gap: 16px; }

  .result-trophy {
    font-size: 72px;
    animation: trophy-spin 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 0 20px var(--neon-gold));
  }
  @keyframes trophy-spin {
    0% { transform: rotate(-30deg) scale(0); opacity: 0; }
    100% { transform: rotate(0deg) scale(1); opacity: 1; }
  }

  .result-title {
    font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900;
    letter-spacing: 3px; text-align: center;
    background: linear-gradient(135deg, var(--neon-gold), var(--neon-orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .result-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; width: 100%; max-width: 340px;
  }
  .result-stat {
    background: var(--bg-card);
    border: 1px solid var(--bg-card-border);
    border-radius: 16px; padding: 16px;
    text-align: center;
  }
  .result-stat .big {
    font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 700;
    color: var(--neon-cyan);
  }
  .result-stat .small { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; margin-top: 4px; }

  .result-rank {
    font-size: 13px; letter-spacing: 2px; text-align: center;
    padding: 10px 24px; border-radius: 20px;
    border: 1px solid;
  }

  .result-btns {
    display: flex; gap: 10px; width: 100%; max-width: 340px;
  }
  .result-btn {
    flex: 1; padding: 16px;
    border-radius: 14px; border: none; cursor: pointer;
    font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700;
    letter-spacing: 2px; transition: all 0.2s;
  }
  .result-btn.primary {
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    color: white;
    box-shadow: 0 0 20px rgba(0,245,255,0.3);
  }
  .result-btn.secondary {
    background: var(--bg-card);
    border: 1px solid var(--bg-card-border);
    color: var(--text-primary);
  }
  .result-btn:active { transform: scale(0.97); }

  /* Keyboard grid */
  .num-keyboard {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; width: 100%; max-width: 380px;
  }
  .num-key {
    padding: 16px; border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700;
    color: white; cursor: pointer; text-align: center;
    transition: all 0.15s; user-select: none;
  }
  .num-key:active {
    background: rgba(0,245,255,0.2);
    border-color: var(--neon-cyan);
    transform: scale(0.93);
    box-shadow: 0 0 10px rgba(0,245,255,0.3);
  }
  .num-key.backspace { color: var(--neon-red); font-size: 18px; }
  .num-key.enter-key {
    background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(191,0,255,0.2));
    border-color: rgba(0,245,255,0.4);
    color: var(--neon-cyan); font-size: 14px;
  }
  .num-key.enter-key:active { background: rgba(0,245,255,0.35); }

  /* Progress bar at top */
  .progress-bar-wrap {
    width: 100%; max-width: 380px; height: 3px;
    background: rgba(255,255,255,0.08); border-radius: 2px;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
    transition: width 0.5s ease;
    box-shadow: 0 0 8px rgba(0,245,255,0.6);
  }

  /* BONUS text */
  .bonus-text {
    font-family: 'Orbitron', monospace; font-size: 11px;
    letter-spacing: 3px; color: var(--neon-gold);
    animation: bonus-appear 0.5s ease;
    text-align: center;
  }
  @keyframes bonus-appear {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Screen glow effect on correct/wrong */
  #screen-flash {
    position: fixed; inset: 0; z-index: 50; pointer-events: none;
    opacity: 0;
  }
  #screen-flash.flash-correct { animation: flash-green 0.4s ease; }
  #screen-flash.flash-wrong { animation: flash-red 0.4s ease; }
  @keyframes flash-green {
    0% { opacity: 0; background: rgba(57,255,20,0.1); }
    30% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes flash-red {
    0% { opacity: 0; background: rgba(255,0,68,0.1); }
    30% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Combo multiplier */
  .combo-badge {
    font-family: 'Orbitron', monospace; font-size: 13px;
    padding: 4px 12px; border-radius: 20px;
    background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.4);
    color: var(--neon-gold); letter-spacing: 1px;
    transition: all 0.3s;
  }
  .combo-badge.hidden { opacity: 0; }
</style>
</head>
<body>
<div id="stars-bg"></div>
<div class="grid-lines"></div>
<div id="screen-flash"></div>

<!-- ══════════ HOME SCREEN ══════════ -->
<div class="screen" id="home">
  <div class="logo-wrap">
    <div class="logo-icon">🚀</div>
    <div class="logo-title">TIMES QUEST</div>
    <div class="logo-sub">Multiplication Mastery</div>
  </div>

  <div class="stats-bar">
    <div class="stat-chip">
      <div class="val" id="home-best">0</div>
      <div class="lbl">HIGH SCORE</div>
    </div>
    <div class="stat-chip">
      <div class="val" id="home-played">0</div>
      <div class="lbl">GAMES</div>
    </div>
    <div class="stat-chip">
      <div class="val" id="home-acc">-</div>
      <div class="lbl">ACCURACY</div>
    </div>
  </div>

  <div class="range-card">
    <div class="range-title">SELECT YOUR RANGE</div>
    <div class="range-row">
      <label>FROM</label>
      <input type="range" id="range-min" min="1" max="14" value="1" step="1">
      <span class="range-val" id="range-min-val">1</span>
    </div>
    <div class="range-row">
      <label>TO</label>
      <input type="range" id="range-max" min="2" max="15" value="10" step="1">
      <span class="range-val" id="range-max-val">10</span>
    </div>
  </div>

  <div class="diff-row">
    <button class="diff-btn active-easy" data-diff="easy" onclick="setDiff('easy')">⚡ EASY<br><small style="font-size:9px;opacity:0.7">20s / 10 lives</small></button>
    <button class="diff-btn" data-diff="medium" onclick="setDiff('medium')">🔥 MEDIUM<br><small style="font-size:9px;opacity:0.7">12s / 5 lives</small></button>
    <button class="diff-btn" data-diff="hard" onclick="setDiff('hard')">💀 HARD<br><small style="font-size:9px;opacity:0.7">8s / 3 lives</small></button>
  </div>

  <button class="start-btn" onclick="startGame()">LAUNCH MISSION</button>
</div>

<!-- ══════════ GAME SCREEN ══════════ -->
<div class="screen hidden" id="game">
  <div class="hud">
    <div class="hud-lives" id="hud-lives"></div>
    <div class="hud-score" id="hud-score">0</div>
    <div class="hud-timer-wrap">
      <svg class="timer-svg" viewBox="0 0 48 48">
        <circle class="timer-bg" cx="24" cy="24" r="20"/>
        <circle class="timer-ring" id="timer-ring" cx="24" cy="24" r="20"/>
      </svg>
      <div class="timer-text" id="timer-text">20</div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="streak-bar">
    <span class="streak-label">STREAK</span>
    <div class="streak-dots" id="streak-dots"></div>
    <span class="combo-badge hidden" id="combo-badge">x2</span>
  </div>

  <div class="question-arena">
    <div class="level-badge" id="level-badge">QUESTION 1/20</div>
    <div class="question-card" id="question-card">
      <div class="question-text" id="question-text">7 × 8 = ?</div>
    </div>
    <div class="bonus-text hidden" id="bonus-text">⚡ SPEED BONUS!</div>
  </div>

  <div class="answer-section">
    <div class="answer-input-wrap">
      <input type="text" id="answer-input" placeholder="?" readonly inputmode="none" autocomplete="off">
    </div>
    <div class="num-keyboard">
      <div class="num-key" onclick="numKey('7')">7</div>
      <div class="num-key" onclick="numKey('8')">8</div>
      <div class="num-key" onclick="numKey('9')">9</div>
      <div class="num-key" onclick="numKey('4')">4</div>
      <div class="num-key" onclick="numKey('5')">5</div>
      <div class="num-key" onclick="numKey('6')">6</div>
      <div class="num-key" onclick="numKey('1')">1</div>
      <div class="num-key" onclick="numKey('2')">2</div>
      <div class="num-key" onclick="numKey('3')">3</div>
      <div class="num-key backspace" onclick="numKey('back')">⌫</div>
      <div class="num-key" onclick="numKey('0')">0</div>
      <div class="num-key enter-key" onclick="submitAnswer()">✓ GO</div>
    </div>
  </div>
</div>

<!-- ══════════ RESULT SCREEN ══════════ -->
<div class="screen hidden" id="result">
  <div class="result-trophy" id="result-trophy">🏆</div>
  <div class="result-title" id="result-title">MISSION COMPLETE</div>
  <div class="result-stats">
    <div class="result-stat">
      <div class="big" id="result-score">0</div>
      <div class="small">SCORE</div>
    </div>
    <div class="result-stat">
      <div class="big" id="result-acc">0%</div>
      <div class="small">ACCURACY</div>
    </div>
    <div class="result-stat">
      <div class="big" id="result-streak">0</div>
      <div class="small">BEST STREAK</div>
    </div>
    <div class="result-stat">
      <div class="big" id="result-bonus">0</div>
      <div class="small">SPEED BONUS</div>
    </div>
  </div>
  <div class="result-rank" id="result-rank">⭐ CADET</div>
  <div class="result-btns">
    <button class="result-btn primary" onclick="startGame()">PLAY AGAIN</button>
    <button class="result-btn secondary" onclick="showHome()">HOME BASE</button>
  </div>
</div>

<!-- Feedback overlay -->
<div id="feedback-overlay">
  <div class="feedback-text" id="feedback-text"></div>
  <div class="feedback-sub" id="feedback-sub"></div>
</div>

<script>
// ══════════════════════════════
//  GAME STATE
// ══════════════════════════════
const TOTAL_QUESTIONS = 20;
const STREAK_MAX = 5;

const DIFF = {
  easy:   { time: 20, lives: 10, basePoints: 10, label:'easy' },
  medium: { time: 12, lives: 5,  basePoints: 15, label:'medium' },
  hard:   { time: 8,  lives: 3,  basePoints: 25, label:'hard' }
};

let state = {
  screen: 'home',
  rangeMin: 1, rangeMax: 10,
  difficulty: 'easy',
  score: 0, lives: 10,
  question: null, answer: 0,
  questionNum: 0,
  streak: 0, bestStreak: 0,
  correct: 0, total: 0,
  timer: 20, timerInterval: null,
  timeBonus: 0,
  locked: false,
  speedBonusCount: 0
};

let save = { best: 0, played: 0, totalAcc: 0, accCount: 0 };
try { save = JSON.parse(localStorage.getItem('timesquest') || '{}') || save; } catch(e) {}

// ══════════════════════════════
//  STARS
// ══════════════════════════════
(function createStars() {
  const bg = document.getElementById('stars-bg');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;opacity:${0.1+Math.random()*0.5};width:${1+Math.random()*2}px;height:${1+Math.random()*2}px`;
    bg.appendChild(s);
  }
})();

// ══════════════════════════════
//  SCREENS
// ══════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  state.screen = id;
}

function showHome() {
  clearTimer();
  updateHomeStats();
  showScreen('home');
}

function updateHomeStats() {
  document.getElementById('home-best').textContent = save.best || 0;
  document.getElementById('home-played').textContent = save.played || 0;
  const acc = save.accCount ? Math.round(save.totalAcc / save.accCount) + '%' : '-';
  document.getElementById('home-acc').textContent = acc;
}

// ══════════════════════════════
//  SETTINGS
// ══════════════════════════════
document.getElementById('range-min').addEventListener('input', function() {
  state.rangeMin = +this.value;
  if (state.rangeMin >= state.rangeMax) {
    state.rangeMax = state.rangeMin + 1;
    document.getElementById('range-max').value = state.rangeMax;
    document.getElementById('range-max-val').textContent = state.rangeMax;
  }
  document.getElementById('range-min-val').textContent = state.rangeMin;
});
document.getElementById('range-max').addEventListener('input', function() {
  state.rangeMax = +this.value;
  if (state.rangeMax <= state.rangeMin) {
    state.rangeMin = state.rangeMax - 1;
    document.getElementById('range-min').value = state.rangeMin;
    document.getElementById('range-min-val').textContent = state.rangeMin;
  }
  document.getElementById('range-max-val').textContent = state.rangeMax;
});

function setDiff(d) {
  state.difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => {
    b.className = 'diff-btn';
    if (b.dataset.diff === d) b.classList.add('active-' + d);
  });
}

// ══════════════════════════════
//  GAME START
// ══════════════════════════════
function startGame() {
  const cfg = DIFF[state.difficulty];
  Object.assign(state, {
    score: 0, lives: cfg.lives,
    questionNum: 0, streak: 0, bestStreak: 0,
    correct: 0, total: 0, timer: cfg.time,
    locked: false, speedBonusCount: 0, timeBonus: 0
  });
  buildStreakDots();
  updateHUD();
  updateProgress();
  showScreen('game');
  nextQuestion();
}

function buildStreakDots() {
  const c = document.getElementById('streak-dots');
  c.innerHTML = '';
  for (let i = 0; i < STREAK_MAX; i++) {
    const d = document.createElement('div');
    d.className = 'streak-dot';
    d.id = 'dot-' + i;
    c.appendChild(d);
  }
}

// ══════════════════════════════
//  QUESTIONS
// ══════════════════════════════
function nextQuestion() {
  if (state.questionNum >= TOTAL_QUESTIONS) { endGame(); return; }
  state.locked = false;
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').className = '';
  document.getElementById('bonus-text').classList.add('hidden');

  const a = randInt(state.rangeMin, state.rangeMax);
  const b = randInt(1, 15);
  state.question = { a, b };
  state.answer = a * b;

  const qt = document.getElementById('question-text');
  qt.style.animation = 'none';
  qt.offsetHeight;
  qt.style.animation = '';
  qt.textContent = a + ' × ' + b + ' = ?';

  document.getElementById('level-badge').textContent =
    'QUESTION ' + (state.questionNum + 1) + '/' + TOTAL_QUESTIONS;

  startTimer();
  state.questionNum++;
  updateProgress();
  document.getElementById('answer-input').focus();
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ══════════════════════════════
//  TIMER
// ══════════════════════════════
function startTimer() {
  clearTimer();
  const cfg = DIFF[state.difficulty];
  state.timer = cfg.time;
  updateTimerDisplay();
  state.timerInterval = setInterval(() => {
    state.timer--;
    updateTimerDisplay();
    if (state.timer <= 0) {
      clearTimer();
      handleWrong(true);
    }
  }, 1000);
}

function clearTimer() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
}

function updateTimerDisplay() {
  const cfg = DIFF[state.difficulty];
  const t = state.timer;
  document.getElementById('timer-text').textContent = t;
  const circ = 2 * Math.PI * 20;
  const pct = t / cfg.time;
  document.getElementById('timer-ring').style.strokeDashoffset = circ * (1 - pct);
  const ring = document.getElementById('timer-ring');
  if (pct > 0.5) ring.style.stroke = 'var(--neon-cyan)';
  else if (pct > 0.25) ring.style.stroke = 'var(--neon-gold)';
  else ring.style.stroke = 'var(--neon-red)';
  document.getElementById('timer-text').style.color =
    pct > 0.5 ? 'var(--neon-cyan)' : pct > 0.25 ? 'var(--neon-gold)' : 'var(--neon-red)';
}

// ══════════════════════════════
//  INPUT
// ══════════════════════════════
function numKey(k) {
  if (state.locked || state.screen !== 'game') return;
  const inp = document.getElementById('answer-input');
  if (k === 'back') {
    inp.value = inp.value.slice(0, -1);
  } else {
    if (inp.value.length < 4) inp.value += k;
  }
}

function submitAnswer() {
  if (state.locked || state.screen !== 'game') return;
  const val = document.getElementById('answer-input').value;
  if (!val) return;
  const guess = parseInt(val);
  clearTimer();
  state.total++;
  if (guess === state.answer) {
    handleCorrect();
  } else {
    handleWrong(false);
  }
}

// ══════════════════════════════
//  CORRECT / WRONG
// ══════════════════════════════
function handleCorrect() {
  state.locked = true;
  state.correct++;
  state.streak++;
  if (state.streak > state.bestStreak) state.bestStreak = state.streak;

  const cfg = DIFF[state.difficulty];
  let points = cfg.basePoints;

  // Time bonus
  const timeRatio = state.timer / cfg.time;
  let speedBonus = 0;
  if (timeRatio > 0.7) { speedBonus = cfg.basePoints; state.speedBonusCount++; }
  else if (timeRatio > 0.4) { speedBonus = Math.floor(cfg.basePoints * 0.5); }

  // Streak multiplier
  const mult = state.streak >= 5 ? 3 : state.streak >= 3 ? 2 : 1;
  points = (points + speedBonus) * mult;
  state.score += points;
  state.timeBonus += speedBonus;

  updateHUD();
  updateStreakDots();
  updateCombo(mult);
  flashScreen('correct');
  showFeedback(true, points, speedBonus > 0);
  spawnParticles(true);
  flashInput('correct-flash');

  if (speedBonus > 0) {
    const bt = document.getElementById('bonus-text');
    bt.classList.remove('hidden');
  }

  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = '+' + points;
  const inp = document.getElementById('answer-input').getBoundingClientRect();
  popup.style.left = inp.left + inp.width/2 - 30 + 'px';
  popup.style.top = inp.top - 20 + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 900);

  setTimeout(nextQuestion, 800);
}

function handleWrong(timedOut) {
  state.locked = true;
  state.lives--;
  state.streak = 0;
  updateHUD();
  updateStreakDots();
  updateCombo(1);
  flashScreen('wrong');
  spawnParticles(false);
  flashInput('wrong-flash');
  const msg = timedOut ? 'TIME UP!' : 'WRONG!';
  const sub = 'Answer: ' + state.answer;
  showFeedback(false, 0, false, msg, sub);
  if (state.lives <= 0) {
    setTimeout(endGame, 1000);
  } else {
    setTimeout(nextQuestion, 900);
  }
}

// ══════════════════════════════
//  HUD / UI
// ══════════════════════════════
function updateHUD() {
  document.getElementById('hud-score').textContent = state.score;
  const cfg = DIFF[state.difficulty];
  const lc = document.getElementById('hud-lives');
  lc.innerHTML = '';
  for (let i = 0; i < cfg.lives; i++) {
    const h = document.createElement('span');
    h.className = 'life' + (i >= state.lives ? ' lost' : '');
    h.textContent = '❤️';
    lc.appendChild(h);
  }
}

function updateProgress() {
  const pct = (state.questionNum / TOTAL_QUESTIONS) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function updateStreakDots() {
  for (let i = 0; i < STREAK_MAX; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'streak-dot' + (i < state.streak ? ' lit' : '');
  }
}

function updateCombo(mult) {
  const badge = document.getElementById('combo-badge');
  if (mult > 1) {
    badge.className = 'combo-badge';
    badge.textContent = 'x' + mult + ' COMBO';
  } else {
    badge.className = 'combo-badge hidden';
  }
}

function flashInput(cls) {
  const inp = document.getElementById('answer-input');
  inp.className = cls;
  setTimeout(() => inp.className = '', 500);
}

function flashScreen(type) {
  const el = document.getElementById('screen-flash');
  el.className = '';
  void el.offsetWidth;
  el.className = 'flash-' + type;
}

function showFeedback(correct, pts, speed, customMsg, customSub) {
  const overlay = document.getElementById('feedback-overlay');
  const ft = document.getElementById('feedback-text');
  const fs = document.getElementById('feedback-sub');

  const msgs = correct
    ? ['CORRECT!','PERFECT!','AMAZING!','NAILED IT!','SUPERB!']
    : ['WRONG!','NOPE!','MISS!','OOPS!'];

  ft.textContent = customMsg || msgs[Math.floor(Math.random()*msgs.length)];
  ft.className = 'feedback-text ' + (correct ? 'correct' : 'wrong');
  fs.textContent = customSub || (correct ? (speed ? '⚡ SPEED BONUS!' : '') : '');

  overlay.className = 'show';
  setTimeout(() => overlay.className = '', 700);
}

// ══════════════════════════════
//  PARTICLES
// ══════════════════════════════
function spawnParticles(correct) {
  const colors = correct
    ? ['#39ff14','#00f5ff','#ffd700','#bf00ff']
    : ['#ff0044','#ff6b00'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.55;
  for (let i = 0; i < (correct ? 18 : 8); i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.random() * 2 * Math.PI);
    const dist = 60 + Math.random() * 120;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist - 80}px;
      --dur:${0.5 + Math.random()*0.5}s;
      box-shadow: 0 0 6px currentColor;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

// ══════════════════════════════
//  END GAME
// ══════════════════════════════
function endGame() {
  clearTimer();
  const acc = state.total > 0 ? Math.round((state.correct / state.total) * 100) : 0;

  // Save stats
  save.played = (save.played || 0) + 1;
  if (state.score > (save.best || 0)) save.best = state.score;
  save.totalAcc = (save.totalAcc || 0) + acc;
  save.accCount = (save.accCount || 0) + 1;
  try { localStorage.setItem('timesquest', JSON.stringify(save)); } catch(e) {}

  document.getElementById('result-score').textContent = state.score;
  document.getElementById('result-acc').textContent = acc + '%';
  document.getElementById('result-streak').textContent = state.bestStreak;
  document.getElementById('result-bonus').textContent = state.speedBonusCount;

  // Rank
  const rank = getRank(state.score, acc);
  const rankEl = document.getElementById('result-rank');
  rankEl.textContent = rank.label;
  rankEl.style.color = rank.color;
  rankEl.style.borderColor = rank.color;
  rankEl.style.background = rank.bg;

  const trophy = document.getElementById('result-trophy');
  trophy.textContent = rank.icon;

  const titleEl = document.getElementById('result-title');
  if (state.lives <= 0) {
    titleEl.textContent = 'MISSION FAILED';
    titleEl.style.background = 'linear-gradient(135deg, #ff0044, #ff6b00)';
  } else {
    titleEl.textContent = 'MISSION COMPLETE';
    titleEl.style.background = 'linear-gradient(135deg, #ffd700, #ff6b00)';
  }
  titleEl.style.webkitBackgroundClip = 'text';
  titleEl.style.webkitTextFillColor = 'transparent';

  showScreen('result');
}

function getRank(score, acc) {
  if (acc >= 95 && score >= 300) return { label: '🌟 GRANDMASTER', color: '#ffd700', bg: 'rgba(255,215,0,0.1)', icon: '👑' };
  if (acc >= 85 && score >= 200) return { label: '💎 ELITE', color: '#00f5ff', bg: 'rgba(0,245,255,0.1)', icon: '🏆' };
  if (acc >= 70 && score >= 120) return { label: '⚡ VETERAN', color: '#bf00ff', bg: 'rgba(191,0,255,0.1)', icon: '🎖️' };
  if (acc >= 55)                 return { label: '🔥 SOLDIER', color: '#ff6b00', bg: 'rgba(255,107,0,0.1)', icon: '🥈' };
  return                                { label: '⭐ CADET',   color: '#39ff14', bg: 'rgba(57,255,20,0.1)', icon: '🥉' };
}

// ══════════════════════════════
//  INIT
// ══════════════════════════════
updateHomeStats();
showScreen('home');
</script>
</body>
</html>
